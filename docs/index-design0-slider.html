              <p class="pane-title">Nowe brzmienia (Finał)</p>
            </button>
            <button class="weekend-pane" data-weekend-index="3">
              <p class="pane-dates">25–27 września 2026</p>
              <p class="pane-title">Weekend Szkoły Muzycznej</p>
            </button>
          </div>
        </div>
        <div class="event-row-wrapper">
          <!-- Prev/next arrows, the same shopping-carousel mechanism on
               both desktop (click) and mobile (tap), replacing the native
               scrollbar the row used to rely on (see .event-scroll-row and
               scrollEventRow() below). Native swipe/drag on the row itself
               still works too; these are an additional, explicit
               affordance, not the only way to move the row. -->
          <button class="event-scroll-arrow event-scroll-arrow-prev" id="event-scroll-prev" type="button" aria-label="Poprzednie wydarzenie">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10.5 2.5 4.5 8l6 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="event-scroll-row" id="event-scroll-row"></div>
          <button class="event-scroll-arrow event-scroll-arrow-next" id="event-scroll-next" type="button" aria-label="Następne wydarzenie">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5.5 2.5 11.5 8l-6 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div id="map">
          <!-- Required public funding disclosure (see README.md's Contents
               of the slides section): a single banner image carrying the
               required text and every sponsor/patronage/organizer/partner
               logo, replacing the previous text paragraph plus five
               individually sized logos now that the funder requires many
               more logos than five (see the .map-funding-notice-banner CSS
               rule above). Shown by default, hidden by selectEvent() and
               re-shown by selectWeekend() (see the .map-funding-notice CSS
               rule above for the full reasoning). No standalone close
               button: picking an event pane is the only way to hide it,
               picking a weekend pane the only way to bring it back. -->
          <div class="map-funding-notice" id="map-funding-notice">
            <img class="map-funding-notice-banner" src="logos/fmm26_belka.jpg" alt="Dofinansowano ze środków Ministra Kultury i Dziedzictwa Narodowego pochodzących z Funduszu Promocji Kultury – państwowego funduszu celowego, w ramach programu „Muzyka”, realizowanego przez Narodowy Instytut Muzyki i Tańca. Logotypy sponsorów, patronatów, organizatora i partnerów festiwalu.">
          </div>
        </div>
        <div class="map-footer"></div>
      </section>
    </div>
  </div>

  <!-- Fullscreen event poster overlay, shown on marker click. Not a
       reveal.js slide: it is a plain overlay so the map and weekend/event
       panes stay exactly where they were underneath it. -->
  <div class="poster-overlay" id="poster-overlay">
    <div class="poster-frame">
      <!-- No src attribute until openPoster() sets one: browsers fetch an
           <img> as soon as it is parsed even while hidden by CSS, so
           src="" would otherwise make an unnecessary request for the
           current page itself, interpreted as a relative empty URL. -->
      <img id="poster-overlay-image" alt="">
      <button class="poster-close" id="poster-close" aria-label="Zamknij plakat wydarzenia">&times;</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@6.0.1/dist/reveal.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script>
    // Force the html element height to exactly the current visible
    // viewport height before Reveal.initialize() reads it for scale calculation.
    // dvh CSS is ignored on older mobile browsers; this JS approach works universally.
    function syncViewportHeight() {
      document.documentElement.style.height = window.innerHeight + 'px';
    }
    syncViewportHeight();
    window.addEventListener('resize', syncViewportHeight);

    // Swallow single-finger scroll gestures so the page never scrolls and the
    // mobile URL bar neither hides nor shows on finger movements. Two-finger
    // pinch zoom and panning while zoomed in remain available, which WCAG 2.2
    // success criterion 1.4.4 requires. Map drags still work despite this:
    // MapLibre GL JS registers its own touchmove listener directly on the
    // map container, which is closer to the touch target than document and
    // so runs first during the bubble phase; this handler's preventDefault()
    // only stops the browser from also treating the drag as a page scroll,
    // it does not undo MapLibre's already-completed pan update.
    document.addEventListener('touchmove', function(event) {
      if (event.touches.length > 1) return;
      if (window.visualViewport && window.visualViewport.scale > 1) return;
      event.preventDefault();
    }, { passive: false });

    // The event-scroll-row relies on native browser scrolling (no JS pans
    // it), unlike the map. A native scroll has not happened yet when the
    // document-level touchmove listener above runs, so its preventDefault()
    // would block the row's scroll too unless stopped here first. Listeners
    // registered directly on an element run before the same event reaches
    // document during the bubble phase, so calling stopPropagation() here
    // keeps the document handler from ever seeing this gesture.
    document.getElementById('event-scroll-row').addEventListener('touchmove', function(event) {
      event.stopPropagation();
    }, { passive: true });

    // Prev/next arrows (see .event-scroll-arrow and scrollEventRow above):
    // one 'click' listener per button covers both a mouse click and a
    // touch tap, since browsers synthesize a 'click' from a tap. The
    // row's own 'scroll' event (fired for both the arrows' smooth scroll
    // and native drag/swipe) keeps the arrows' shown/hidden state correct
    // regardless of which of the two moved the row, and 'resize' re-checks
    // it too, since a width/orientation change can change how much of the
    // row's own content fits without scrolling at all.
    document.getElementById('event-scroll-prev').addEventListener('click', function() {
      scrollEventRow(-1);
    });
    document.getElementById('event-scroll-next').addEventListener('click', function() {
      scrollEventRow(1);
    });
    document.getElementById('event-scroll-row').addEventListener('scroll', updateEventScrollArrows, { passive: true });
    window.addEventListener('resize', updateEventScrollArrows);

    // A mouse wheel or trackpad two-finger swipe both fire 'wheel' events,
    // which overflow-x:auto would otherwise translate into horizontal
    // scrolling; blocked here so the arrow buttons are the only non-touch
    // way to move the row on desktop. A real touchscreen swipe fires
    // touchstart/touchmove/touchend instead, never 'wheel', so this does
    // not affect mobile drag-scrolling (handled separately by the
    // touchmove listener above).
    document.getElementById('event-scroll-row').addEventListener('wheel', function(event) {
      event.preventDefault();
    }, { passive: false });

    // disableLayout: true opts out of Reveal's default behavior of scaling
    // a fixed-aspect-ratio virtual canvas (1280x720) to fit the viewport,
    // which letterboxed this design with blank bars whenever the actual
    // window's aspect ratio was not exactly 16:9 - most noticeably as
    // blank space below the map, since the map never got the remainder of
    // a viewport shorter or taller than the assumed ratio. With
    // disableLayout, the slide covers 100% of the real viewport and this
    // file's own flex/vh-based CSS governs sizing, matching every aspect
    // ratio instead of one assumed one.
    Reveal.initialize({
      backgroundColor: '#ffffff',
      disableLayout: true,
      controls: false,
      progress: false,
      hash: false
    });

    // Weekend 1's events use real, geocoded venue coordinates. Only the
    // Inauguracja poster is a real, verified individual poster; the other
    // events use the main festival poster as a generic placeholder, since
    // the real 2026 poster for each does not exist yet. Weekend 2 has 2 of
    // its 5 real events populated; Weekends 3-4 are left empty, since a
    // couple of populated weekends are enough to assess this design.
    // Every poster below is a local file in this directory (docs/), the
    // full-size version, not the thumb_ one, for a sharper image on
    // high-resolution phone displays. Not loaded from
    // http://www.ptm.info.pl/ (the organizer's own site, where these were
    // downloaded from) because that site serves plain HTTP, and mobile
    // browsers block loading an HTTP image from a page served over HTTPS
    // (GitHub Pages always serves HTTPS) as mixed content. Restore the
    // ptm.info.pl URLs once the organizer's site supports HTTPS.
    const weekendData = [
      {
        dates: '4–6 września 2026',
        title: 'Pamięć i tożsamość',
        startDate: '2026-09-04',
        endDate: '2026-09-06',
        events: [
          {
            // Both datetime (the displayed label) and date (used for the
            // .past gray-shading check) are intentionally kept pointing to
            // a past January date instead of the real 4 September, so
            // design reviewers can tell why this one card is gray just by
            // reading it, without knowing today's real date or needing a
            // mocked clock. Revert both to the real
            // 'Piątek, 4 września, 17:00' / '2026-09-04' once no longer
            // needed for review.
            datetime: 'Czwartek, 1 stycznia, 17:00',
            date: '2026-01-01',
            title: 'Inauguracja Festiwalu: Orkiestra Kameralna Polskiego Radia Amadeus',
            venue: 'Centrum Kultury Dwór Artusa',
            description: 'Koncert otwierający festiwal z udziałem Orkiestry Kameralnej Polskiego Radia Amadeus.',
            coords: [18.6044919, 53.0098406],
            poster: '01_inauguracja.png'
          },
          {
            datetime: 'Sobota, 5 września, 17:00',
            date: '2026-09-05',
            title: 'Spotkanie z kompozytorką',
            venue: 'Dom Heleny Grossówny',
            description: 'Rozmowa o współczesnej muzyce polskiej z zaproszoną kompozytorką.',
            coords: [18.6157848, 53.0105577],
            poster: 'fmm_plakat.png'
          },
          {
            datetime: 'Sobota, 5 września, 20:00',
            date: '2026-09-05',
            title: 'Głos Młodych: recital solistów',
            venue: 'Sala Mieszczańska Ratusza Staromiejskiego',
            description: 'Recital młodych solistów prezentujących nowy repertuar.',
            coords: [18.6041183, 53.0105224],
            poster: 'fmm_plakat.png'
          },
          {
            datetime: 'Niedziela, 6 września, 17:00',
            date: '2026-09-06',
            title: 'Warsztaty kompozytorskie',
            venue: 'Akademickie Centrum Kultury i Sztuki Od Nowa',
            description: 'Warsztaty dla młodych twórców prowadzone przez kompozytorów festiwalu.',
            coords: [18.5806390, 53.0191280],
            poster: 'fmm_plakat.png'
          },
          {
            datetime: 'Niedziela, 6 września, 20:00',
            date: '2026-09-06',
            title: 'Muzyka dawna: koncert organowy',
            venue: 'Kościół Akademicki pw. Ducha Świętego w Toruniu',
            description: 'Koncert muzyki dawnej na organach kościoła akademickiego.',
            coords: [18.6031236, 53.0101616],
            poster: 'fmm_plakat.png'
          },
          // Not part of the festival's real placeholder schedule (which
          // gives Weekend 1 exactly five events): added only so the
          // event-scroll-row's horizontal scroll can be exercised with a
          // sixth card. Reuses Dwór Artusa's already geocoded coordinates
          // rather than guessing a new venue location.
          {
            datetime: 'Niedziela, 6 września, 22:00',
            date: '2026-09-06',
            title: 'Dodatkowe wydarzenie testowe (scroll)',
            venue: 'Centrum Kultury Dwór Artusa',
            description: 'Karta dodana wyłącznie do przetestowania poziomego przewijania listy wydarzeń.',
            coords: [18.6044919, 53.0098406],
            poster: 'fmm_plakat.png'
          }
        ]
      },
      {
        dates: '11–13 września 2026',
        title: 'Dialog z tradycją',
        startDate: '2026-09-11',
        endDate: '2026-09-13',
        // Only 2 of Weekend 2's 5 real placeholder events are included
        // here, so the weekend-selection and default-highlight logic can
        // be assessed without leaving this weekend empty. Venue
        // coordinates are reused from Weekend 1, since both events happen
        // at venues already geocoded there (Sala Mieszczańska, Dom Heleny
        // Grossówny).
        events: [
          {
            datetime: 'Piątek, 11 września, 17:00',
            date: '2026-09-11',
            title: 'Kaszubskie inspiracje: prawykonania',
            venue: 'Sala Mieszczańska Ratusza Staromiejskiego',
            description: 'Prawykonania utworów inspirowanych muzyką ludową Kaszub.',
            coords: [18.6041183, 53.0105224],
            poster: 'fmm_plakat.png'
          },
          {
            datetime: 'Sobota, 12 września, 17:00',
            date: '2026-09-12',
            title: 'Wernisaż wystawy "Toruńscy Twórcy"',
            venue: 'Dom Heleny Grossówny',
            description: 'Otwarcie wystawy poświęconej toruńskim kompozytorom i wykonawcom.',
            coords: [18.6157848, 53.0105577],
            poster: 'fmm_plakat.png'
          }
        ]
      },
      { dates: '18–20 września 2026', title: 'Nowe brzmienia (Finał)', startDate: '2026-09-18', endDate: '2026-09-20', events: [] },
      { dates: '25–27 września 2026', title: 'Weekend Szkoły Muzycznej', startDate: '2026-09-25', endDate: '2026-09-27', events: [] }
    ];

    /** Returns the index of the weekend to preselect: the first one whose
     *  end date has not yet passed (covers both "currently running" and
     *  "next upcoming"), or the last weekend if the festival is over. */
    function getDefaultWeekendIndex() {
      const today = new Date();
      for (let i = 0; i < weekendData.length; i++) {
        const weekendEnd = new Date(weekendData[i].endDate + 'T23:59:59');
        if (today <= weekendEnd) return i;
      }
      return weekendData.length - 1;
    }

    /** True once the given day has fully elapsed (day resolution, not the
     *  specific hour of a weekend's last day or an individual event),
     *  used to gray-shade past weekend/event panes. */
    function isDateFullyPast(isoDate) {
      const today = new Date();
      const endOfDay = new Date(isoDate + 'T23:59:59');
      return today > endOfDay;
    }

    let selectedWeekendIndex = null;
    let selectedEventIndex = null;
    let eventMarkerInstances = [];
    let mapInitialized = false;
    let libreMap = null;
    const mapCenter = [18.61, 53.012];
    const mapInitialZoom = 13;

    function updateWeekendPaneStyles() {
      document.querySelectorAll('.weekend-pane').forEach(function(pane) {
        const index = Number(pane.dataset.weekendIndex);
        pane.classList.toggle('selected', index === selectedWeekendIndex);
        pane.classList.toggle('past', isDateFullyPast(weekendData[index].endDate));
      });
    }

    function updateEventPaneStyles() {
      document.querySelectorAll('#event-scroll-row .event-pane').forEach(function(pane) {
        const index = Number(pane.dataset.eventIndex);
        pane.classList.toggle('selected', index === selectedEventIndex);
      });
    }

    /** Scrolls the event row by one card width (its flex-basis, 200px,
     *  plus the row's own 8px gap) in the given direction, smoothly. The
     *  same function runs for a mouse click and a touch tap, since the
     *  arrow buttons are plain <button> elements with a single 'click'
     *  listener each (see below): no separate touch-vs-mouse code path,
     *  so desktop and mobile share one mechanism. */
    function scrollEventRow(direction) {
      const eventRow = document.getElementById('event-scroll-row');
      eventRow.scrollBy({ left: direction * 208, behavior: 'smooth' });
    }

    /** Shows/hides and enables/disables the prev/next arrows to match how
     *  far the row can still scroll in each direction. Hidden rather than
     *  merely disabled at either end (see .event-scroll-arrow.hidden
     *  above), and hidden entirely when a weekend has no events yet (the
     *  placeholder-note case, which has nothing to scroll to). A 1px
     *  tolerance absorbs the sub-pixel scrollLeft values some browsers
     *  report at the exact start/end of a scrollable element. */
    function updateEventScrollArrows() {
      const eventRow = document.getElementById('event-scroll-row');
      const prevButton = document.getElementById('event-scroll-prev');
      const nextButton = document.getElementById('event-scroll-next');
      const canScroll = eventRow.scrollWidth > eventRow.clientWidth + 1;
      prevButton.classList.toggle('hidden', !canScroll || eventRow.scrollLeft <= 1);
      nextButton.classList.toggle('hidden', !canScroll ||
        eventRow.scrollLeft + eventRow.clientWidth >= eventRow.scrollWidth - 1);
    }

    /** Rebuilds the horizontal event list for the given weekend. Event pane
     *  content comes entirely from weekendData above, not user input, so
     *  building it with innerHTML carries no injection risk.
     *  Only datetime, title, and venue are shown (3 lines total);
     *  event.description is kept in weekendData for a possible future
     *  individual event slide but not rendered here. */
    function renderEventRow(weekendIndex) {
      const eventRow = document.getElementById('event-scroll-row');
      eventRow.innerHTML = '';
      const events = weekendData[weekendIndex].events;
      if (events.length === 0) {
        const note = document.createElement('p');
        note.className = 'event-placeholder-note';
        note.textContent = 'Wydarzenia tego weekendu zostaną dodane wkrótce.';
        eventRow.appendChild(note);
        updateEventScrollArrows();
        return;
      }
      events.forEach(function(event, eventIndex) {
        const pane = document.createElement('button');
        pane.className = 'event-pane';
        if (isDateFullyPast(event.date)) {
          pane.classList.add('past');
        }
        pane.dataset.eventIndex = String(eventIndex);
        pane.innerHTML =
          '<p class="pane-datetime">' + event.datetime + '</p>' +
          '<p class="pane-title">' + event.title + '</p>' +
          '<p class="pane-venue">' + event.venue + '</p>';
        pane.addEventListener('click', function() {
          selectEvent(weekendIndex, eventIndex);
        });
        eventRow.appendChild(pane);
      });
      eventRow.scrollLeft = 0;
      updateEventScrollArrows();
    }

    function clearEventMarkers() {
      eventMarkerInstances.forEach(function(entry) { entry.marker.remove(); });
      eventMarkerInstances = [];
    }

    function createMarkerElement() {
      const element = document.createElement('div');
      element.className = 'event-marker';
      return element;
    }

    /** Places the single marker the map is ever allowed to show at once
     *  (removing any previous one first), at the given event's venue.
     *  Clicking the marker itself opens that event's poster; clicking the
     *  event pane that led here only moves the marker and the map view,
     *  per the design brief. */
    function showSingleMarker(event) {
      clearEventMarkers();
      if (!libreMap) return;
      const element = createMarkerElement();
      element.addEventListener('click', function(clickEvent) {
        clickEvent.stopPropagation();
        openPoster(event);
      });
      const marker = new maplibregl.Marker({ element: element })
        .setLngLat(event.coords)
        .addTo(libreMap);
      eventMarkerInstances.push({ marker: marker, event: event });
    }

    /** Removes any marker and returns the map to the city overview: the
     *  state the map must be in initially, and whenever the weekend
     *  selection changes (a different weekend's own events have no
     *  relationship to whichever venue was previously marked). Not called
     *  when the poster overlay closes; see closePoster()'s own comment
     *  for why. */
    function resetMapToDefault() {
      clearEventMarkers();
      if (!libreMap) return;
      libreMap.easeTo({ center: mapCenter, zoom: mapInitialZoom, duration: 600 });
    }

    /** Shows the map funding-notice panel (see its own CSS rule above for
     *  why this exists and why it carries no persisted dismissed state). */
    function showFundingNotice() {
      document.getElementById('map-funding-notice').classList.remove('hidden');
    }

    /** Hides the map funding-notice panel, called once a visitor picks an
     *  event, signaling they want to see that venue's marker rather than
     *  read the credits. */
    function hideFundingNotice() {
      document.getElementById('map-funding-notice').classList.add('hidden');
    }

    function selectWeekend(weekendIndex) {
      selectedWeekendIndex = weekendIndex;
      selectedEventIndex = null;
      updateWeekendPaneStyles();
      renderEventRow(weekendIndex);
      updateEventPaneStyles();
      resetMapToDefault();
      // Re-covers the map with the funding notice on every weekend switch,
      // including the initial one at page load (see selectWeekend() call
      // near the bottom of this script), so the notice is not something a
      // visitor can permanently dismiss for the rest of their visit.
      showFundingNotice();
    }

    /** Called from an event pane: places the single allowed marker at that
     *  event's venue and zooms/centers the map on it. Opening the poster
     *  is the marker's own job on click (see showSingleMarker), not the
     *  pane's. */
    function selectEvent(weekendIndex, eventIndex) {
      if (weekendIndex !== selectedWeekendIndex) {
        selectWeekend(weekendIndex);
      }
      selectedEventIndex = eventIndex;
      updateEventPaneStyles();
      const event = weekendData[weekendIndex].events[eventIndex];
      if (!event || !libreMap) return;
      showSingleMarker(event);
      hideFundingNotice();
      libreMap.easeTo({ center: event.coords, zoom: Math.max(mapInitialZoom + 1, libreMap.getZoom()), duration: 600 });
    }

    function openPoster(event) {
      const overlay = document.getElementById('poster-overlay');
      const image = document.getElementById('poster-overlay-image');
      image.src = event.poster;
      image.alt = event.title;
      overlay.classList.add('open');
    }

    /** Forces the browser to reset any pinch-zoom level back to 1.0,
     *  without permanently disabling further pinch-zoom. The poster
     *  overlay is commonly pinch-zoomed into to read the fine print, and
     *  without this the zoom level otherwise stays applied to the whole
     *  page once the poster closes. Momentarily adding maximum-scale to
     *  the viewport meta tag's content is a documented cross-browser way
     *  to force this reset (works in Safari iOS and Chrome Android).
     *  Reverting the attribute on the next two animation frames, rather
     *  than after a fixed timeout, waits for the browser to actually
     *  paint the reset (one frame is not reliably enough in every
     *  browser) instead of guessing a delay long enough to cover it. */
    function resetPageZoom() {
      const viewportMeta = document.querySelector('meta[name="viewport"]');
      const originalContent = viewportMeta.getAttribute('content');
      viewportMeta.setAttribute('content', originalContent + ', maximum-scale=1.0');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          viewportMeta.setAttribute('content', originalContent);
        });
      });
    }

    /** Closing leaves the map exactly as it was while the poster was open
     *  (marker still shown, still centered/zoomed on that event's venue)
     *  and the event pane still marked .selected, rather than resetting to
     *  the city overview: a visitor closing the poster is coming back to
     *  the map to look at the venue they just read about, not asking to
     *  start over. Revised from the original design brief, which called
     *  for always resetting to the marker-free city overview on close;
     *  still resets any pinch-zoom applied while the poster was open,
     *  unrelated to the marker/selection state. */
    function closePoster() {
      document.getElementById('poster-overlay').classList.remove('open');
      resetPageZoom();
    }

    document.getElementById('poster-close').addEventListener('click', closePoster);
    document.getElementById('poster-overlay').addEventListener('click', function(event) {
      if (event.target === event.currentTarget) closePoster();
    });
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closePoster();
    });

    document.querySelectorAll('.weekend-pane').forEach(function(pane) {
      pane.addEventListener('click', function() {
        selectWeekend(Number(pane.dataset.weekendIndex));
      });
    });

    // Preselect the current/upcoming weekend immediately so the weekend row
    // and event list are correct even before the map finishes initializing;
    // resetMapToDefault() inside selectWeekend() is a no-op until libreMap
    // exists (see its own guard above), so this does not touch the map.
    selectWeekend(getDefaultWeekendIndex());

    /** Re-applies whatever is currently selected to the map. Used after a
     *  resize, where the map container's own size may have changed; the
     *  marker itself does not need recreating on resize, since it is no
     *  longer sized relative to a Reveal scale factor (disableLayout means
     *  there is none - see Reveal.initialize above). */
    function refreshMapView() {
      if (!libreMap) return;
      if (selectedEventIndex !== null && selectedWeekendIndex !== null) {
        const event = weekendData[selectedWeekendIndex].events[selectedEventIndex];
        if (event) {
          libreMap.jumpTo({ center: event.coords, zoom: Math.max(mapInitialZoom + 1, libreMap.getZoom()) });
          return;
        }
      }
      libreMap.jumpTo({ center: mapCenter, zoom: mapInitialZoom });
    }

    function initializeMap() {
      if (mapInitialized) return;
      mapInitialized = true;

      const mapElement = document.getElementById('map');
      if (!mapElement) {
        console.error('Map element not found');
        return;
      }

      const map = new maplibregl.Map({
        container: 'map',
        // OpenFreeMap (openfreemap.org) is a free, MIT-licensed vector tile
        // service with no API key, no mandatory branding, and no usage cap.
        // Its "positron" style is the palette base for the festival's
        // white/blue recoloring, applied once the style has loaded (below).
        style: 'https://tiles.openfreemap.org/styles/positron',
        center: mapCenter,
        zoom: mapInitialZoom,
        minZoom: 11,
        maxZoom: 17,
        attributionControl: false
      });

      libreMap = map;

      map.addControl(new maplibregl.AttributionControl({
        compact: false,
        customAttribution: '&copy; <a href="https://marcindulak.github.io">marcindulak</a>'
      }), 'bottom-left');
      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-left');

      // Recolor the OpenFreeMap "positron" style to the festival's 2026
      // cream/sage/navy and hide layers not useful for a venue overview
      // (building outlines, railways, airport, administrative boundaries,
      // and all but the city-level place label). festivalBlue/festivalInk
      // are the same boosted-saturation navy as --primary-color/--text-
      // color (see the :root comment near the top of this file for why
      // the sampled ink needed that boost); festivalPaleBlue is the
      // sampled sage (--sage-color), the 2026 counterpart to the 2025
      // palette's own pale blue water fill, not itself boosted since it
      // is a light decorative fill rather than text/line ink and carries
      // no contrast requirement.
      map.on('load', function() {
        const festivalWhite = '#ffffff';
        const festivalPaleBlue = '#bfcebb';
        const festivalBlue = '#1c3960';
        const festivalInk = '#1c3960';

        // highway-name-major/minor (street name labels) are deliberately
        // not hidden: venues sit on ordinary streets, so labeling those
        // streets helps a visitor orient themselves in a way city/water
        // labels alone do not.
        // highway-name-path (footpath labels) stays hidden: too granular
        // and cluttered at this zoom level to be worth the detail.
        const hiddenLayers = [
          'building',
          'aeroway-taxiway', 'aeroway-runway-casing', 'aeroway-area', 'aeroway-runway',
          'railway_transit', 'railway_transit_dashline',
          'railway_service', 'railway_service_dashline',
          'railway', 'railway_dashline',
          'boundary_3', 'boundary_2', 'boundary_disputed',
          'waterway_line_label',
          'highway-name-path',
          'highway-shield-non-us', 'highway-shield-us-interstate', 'road_shield_us',
          'airport', 'label_other', 'label_village', 'label_town',
          'label_country_3', 'label_country_2', 'label_country_1'
        ];
        hiddenLayers.forEach(function(layerId) {
          map.setLayoutProperty(layerId, 'visibility', 'none');
        });

        map.setPaintProperty('background', 'background-color', festivalWhite);

        ['park', 'landcover_ice_shelf', 'landcover_glacier', 'landuse_residential', 'landcover_wood'].forEach(function(layerId) {
          map.setPaintProperty(layerId, 'fill-color', festivalWhite);
        });

        map.setPaintProperty('water', 'fill-color', festivalPaleBlue);

        const roadLayers = [
          'waterway', 'tunnel_motorway_casing', 'tunnel_motorway_inner',
          'road_area_pier', 'road_pier',
          'highway_path', 'highway_minor',
          'highway_major_casing', 'highway_major_inner', 'highway_major_subtle',
          'highway_motorway_casing', 'highway_motorway_inner', 'highway_motorway_subtle',
          'highway_motorway_bridge_casing', 'highway_motorway_bridge_inner'
        ];
        roadLayers.forEach(function(layerId) {
          const property = map.getLayer(layerId).type === 'fill' ? 'fill-color' : 'line-color';
          map.setPaintProperty(layerId, property, festivalBlue);
        });

        [
          'water_name_point_label', 'water_name_line_label', 'label_city', 'label_city_capital',
          'highway-name-major', 'highway-name-minor'
        ].forEach(function(layerId) {
          map.setPaintProperty(layerId, 'text-color', festivalInk);
          map.setPaintProperty(layerId, 'text-halo-color', festivalWhite);
        });
      });

      // No marker is added here: the map must start without any marker
      // (see resetMapToDefault() and the design brief), and the map's own
      // constructor above already opens on mapCenter/mapInitialZoom, so
      // there is nothing further to apply at this point.

      // Orientation change or browser resize (e.g. mobile URL bar appearing/
      // disappearing) causes MapLibre to lose track of its container
      // dimensions. resize() forces MapLibre to recalculate and repaint
      // tiles; the view is then reapplied since the container's available
      // space may have changed.
      window.addEventListener('resize', function() {
        if (!libreMap) return;
        libreMap.resize();
        refreshMapView();
      });
    }

    Reveal.addEventListener('ready', function() {
      initializeMap();
      // Try to lock to landscape; silently fails on iOS and on Android outside
      // fullscreen/PWA context, which is the expected result for a normal page.
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(error) {
          console.log('Cannot lock orientation to landscape:', error);
        });
      }
    });
  </script>
</body>
</html>
